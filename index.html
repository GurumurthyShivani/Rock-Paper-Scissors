<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors Game</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    



    <div class="box">
    <p class="title">Rock Paper Scissors </p>
    
    <button class="rock">✊</button>

    <button class="paper">🖐️</button>

    <button class="scissors">✌️</button>

    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>

    <button onclick="
        score.wins=0;
        score.losses=0;
        score.Ties=0;
        localStorage.removeItem('score');
        updateScoreElement();
        " class="js-reset">Reset Score</button>

    <button onclick=" autoplay();
    " class="js-autoplay">Auto play</button>
    </div>

    <marquee class="scroll" scrollamount="9">Press 'r' for Rock, 'p' for Paper, 's' for Scissors to play the game.</marquee>



    <script src="index.js"></script>
</body>
</html>
